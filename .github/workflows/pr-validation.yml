name: PR Validation

on:
  pull_request:
    branches:
      - develop
      - staging
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: purchase_order_service_test_db
          PGDATA: /var/lib/postgresql/data/pgdata
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup .NET 10.0
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Switch to PackageReference for CI
        run: |
          # Determine version format based on target branch
          BASE_BRANCH="${{ github.base_ref }}"
          if [ "$BASE_BRANCH" == "main" ]; then
            VERSION_FORMAT="1.0.*"
          else
            VERSION_FORMAT="1.0.*-*"
          fi
          
          echo "Target branch is $BASE_BRANCH. Using version format: $VERSION_FORMAT"
          
          # Replace ProjectReference with PackageReference in all service csproj files
          for file in $(find . -name "*.csproj"); do
            sed -i "s|<ProjectReference Include=".*Maliev.Aspire.ServiceDefaults.*.csproj" />|<PackageReference Include=\"Maliev.Aspire.ServiceDefaults\" Version=\"$VERSION_FORMAT\" />|g" "$file"
            sed -i "s|<ProjectReference Include=".*Maliev.MessagingContracts.*.csproj" />|<PackageReference Include=\"Maliev.MessagingContracts\" Version=\"$VERSION_FORMAT\" />|g" "$file"
          done
          echo "Switched to PackageReference for ServiceDefaults and MessagingContracts"

      - name: Restore dependencies
        run: dotnet restore Maliev.PurchaseOrderService.sln
        env:
          NUGET_USERNAME: ${{ github.actor }}
          NUGET_PASSWORD: ${{ secrets.GITOPS_PAT }}

      - name: Build solution
        run: dotnet build Maliev.PurchaseOrderService.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test Maliev.PurchaseOrderService.sln --no-build --configuration Release --verbosity normal
        env:
          ConnectionStrings__PurchaseOrderDbContext: "Server=localhost;Port=5432;Database=purchase_order_service_test_db;User Id=postgres;Password=postgres;"


